<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0EA5A4"/>
      <stop offset="1" stop-color="#155E75"/>
    </linearGradient>
    <linearGradient id="sv2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#CDEFF0"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bg2)"/>

  <!-- subtle inner panel -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="none"
        stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="3"/>

  <!-- SV monogram -->
  <text x="128" y="150" text-anchor="middle"
        font-family="'DejaVu Sans', Arial, sans-serif" font-weight="800"
        font-size="118" fill="url(#sv2)" letter-spacing="-6">SV</text>

  <!-- digital waveform underline -->
  <path d="M58 188 H82 V172 H108 V188 H134 V172 H160 V188 H198"
        fill="none" stroke="#FBBF24" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>
