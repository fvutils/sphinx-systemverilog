name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly: also run the slow UVM corpus smoke tests.
    - cron: "0 5 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Install Graphviz (for inheritance diagrams in the docs build)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      # Fetch dependencies (including the UVM sources) into ./packages so the
      # docs build renders the live UVM reference and corpus tests have UVM.
      - uses: fvutils/ivpm-setup@v1
        with:
          python-version: ${{ matrix.python-version }}
          args: "-a"

      - name: Install package (editable) into the ivpm environment
        run: ./packages/python/bin/python -m pip install -e ".[dev]"

      - name: Run unit and integration tests
        run: ./packages/python/bin/python -m pytest -m "unit or sphinx" -q

      - name: Build documentation (warnings as errors, live UVM reference)
        run: ./packages/python/bin/python -m sphinx -W -b html docs docs/_build/html

  deploy-pages:
    # Publish the docs to GitHub Pages, but only for pushes to main
    # (not on PRs or the nightly schedule), and only after tests pass.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Graphviz (for inheritance diagrams in the docs build)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      # UVM is needed here too: this job builds the *published* site, which
      # includes the live UVM reference.
      - uses: fvutils/ivpm-setup@v1
        with:
          python-version: "3.12"
          args: "-a"

      - name: Install package (editable) into the ivpm environment
        run: ./packages/python/bin/python -m pip install -e ".[dev]"

      - name: Build documentation (warnings as errors, live UVM reference)
        run: ./packages/python/bin/python -m sphinx -W -b html docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  corpus:
    # Slow corpus smoke test (parses the full UVM library); nightly only.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: fvutils/ivpm-setup@v1
        with:
          python-version: "3.12"
          args: "-a"

      - name: Install package (editable) into the ivpm environment
        run: ./packages/python/bin/python -m pip install -e ".[dev]"

      - name: Corpus smoke tests (UVM)
        run: ./packages/python/bin/python -m pytest -m corpus -q
