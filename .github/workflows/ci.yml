name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly: also run the slow UVM corpus smoke tests.
    - cron: "0 5 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Graphviz (for inheritance diagrams in the docs build)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit and integration tests
        run: pytest -m "unit or sphinx" -q

      - name: Build documentation (warnings as errors)
        run: sphinx-build -W -b html docs docs/_build/html

  deploy-pages:
    # Publish the docs to GitHub Pages, but only for pushes to main
    # (not on PRs or the nightly schedule), and only after tests pass.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Graphviz (for inheritance diagrams in the docs build)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build documentation (warnings as errors)
        run: sphinx-build -W -b html docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  corpus:
    # Slow corpus smoke test; only on the nightly schedule.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Corpus smoke tests
        run: pytest -m corpus -q
